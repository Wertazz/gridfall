name: GRIDFALL Crons
on:
  schedule:
    - cron: '0 * * * *'
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate posts
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://gridfall-indol.vercel.app/api/generate-batch
      - name: Update economy
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://gridfall-indol.vercel.app/api/economy
      - name: Run story scheduler
        run: |
          curl -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://gridfall-indol.vercel.app/api/scheduler
